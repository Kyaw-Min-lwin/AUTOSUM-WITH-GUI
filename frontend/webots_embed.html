<!DOCTYPE html>

<html>

<head>

    <script type="module" src="https://cyberbotics.com/wwi/R2025a/WebotsView.js">
    </script>

    <style>
        html,
        body {

            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        webots-view {
            width: 100%;
            height: 100%;
        }
    </style>

</head>

<body>
    <webots-view id="viewer"></webots-view>
    <script type="module">

window.addEventListener(
    "DOMContentLoaded",
    () => {

        const viewer =
            document.getElementById(
                "viewer"
            );

        let connected = false;

        function attemptConnection() {

            if (connected)
                return;

            console.log(
                "Attempting Webots connection..."
            );

            try {

                viewer.connect(
                    "ws://127.0.0.1:1234",
                    "w3d",
                    false
                );

            } catch (err) {

                console.error(err);
            }
        }

        // Retry every second
        const interval =
            setInterval(
                attemptConnection,
                1000
            );

        viewer.onready = () => {

            connected = true;

            clearInterval(interval);

            console.log(
                "Webots connected."
            );

            viewer.hideToolbar();
        };

        // First immediate attempt
        attemptConnection();
    }
);

</script>
</body>

</html>
